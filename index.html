<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黑屋：文明扩张 - 灵感时代</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        
        body {
            font-family: 'Courier Prime', monospace;
            background-color: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 2s;
        }

        .game-container {
            display: grid;
            grid-template-columns: 320px 1fr 380px;
            height: 100vh;
            gap: 1px;
            background-color: #222;
        }

        .panel {
            background-color: #0a0a0a;
            padding: 20px;
            overflow-y: auto;
        }

        .log-panel {
            display: flex;
            flex-direction: column-reverse;
            background: #050505;
        }

        .stats-panel { border-right: 1px solid #222; }
        .actions-panel { border-left: 1px solid #222; }

        .tab-btn {
            display: inline-block;
            width: auto;
            margin-right: 15px;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            padding: 8px 12px;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: #666;
        }
        .tab-btn.active {
            border-bottom: 2px solid #fbbf24;
            color: #fbbf24;
        }

        button {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        button:hover:not(:disabled) {
            background-color: #e0e0e0;
            color: #000;
        }

        button:disabled {
            color: #333;
            border-color: #222;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .resource-item {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .log-entry {
            margin-bottom: 12px;
            line-height: 1.5;
            animation: fadeIn 0.4s ease-out;
            font-size: 0.95rem;
        }

        .hidden { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-5px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .sparkle-btn {
            border-color: #fbbf24;
            background: linear-gradient(45deg, #000, #111);
            color: #fbbf24;
        }
        .sparkle-btn:hover {
            background: #fbbf24 !important;
            color: #000 !important;
        }

        #ai-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            pointer-events: none;
        }

        .ai-message {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #fbbf24;
            padding: 15px;
            max-width: 300px;
            font-size: 0.8rem;
            color: #fbbf24;
            border-radius: 4px;
            pointer-events: auto;
            margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.2);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #ambient-filter {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
            transition: background 3s;
        }

        .progress-bar {
            height: 2px;
            background: #fbbf24;
            position: absolute;
            bottom: 0; left: 0; width: 0%;
            transition: width linear;
        }
    </style>
</head>
<body>

    <div id="ambient-filter"></div>
    <div id="ai-overlay"></div>

    <div class="game-container">
        <!-- 左侧：统计与特质 -->
        <div class="panel stats-panel">
            <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-2">
                <h2 class="text-xl font-bold text-gray-500 uppercase">库存</h2>
                <div id="weather-display" class="text-xs px-2 py-1 border border-gray-700 text-gray-400">常规</div>
            </div>
            
            <div id="resources" class="space-y-1">
                <div class="resource-item"><span>木头</span><span id="count-wood">0</span></div>
                <div class="resource-item"><span>煤炭</span><span id="count-coal">0</span></div>
                <div class="resource-item"><span>皮毛</span><span id="count-fur">0</span></div>
                <div class="resource-item"><span>肉</span><span id="count-meat">0</span></div>
                <div class="resource-item hidden" id="res-iron"><span>铁矿</span><span id="count-iron">0</span></div>
                <div class="resource-item hidden" id="res-steel"><span>钢材</span><span id="count-steel">0</span></div>
            </div>

            <h2 class="text-xl font-bold mt-10 mb-6 border-b border-gray-800 pb-2 text-gray-500 uppercase">✨ 灵感与特质</h2>
            <div id="traits-list" class="text-xs text-gray-500 space-y-2">
                <div id="no-traits">尚无特殊印记。</div>
            </div>
            <button id="btn-ai-oracle" class="sparkle-btn mt-4 text-xs" onclick="getAIAdvice()">
                ✨ 聆听虚空的智慧 (消耗 5 煤炭)
            </button>

            <h2 class="text-xl font-bold mt-10 mb-6 border-b border-gray-800 pb-2 text-gray-500 uppercase">人口</h2>
            <div id="population-stats">
                <div class="resource-item"><span>总人口</span><span id="pop-total">0</span></div>
                <div class="resource-item text-yellow-600"><span>空闲</span><span id="pop-idle">0</span></div>
                <div id="jobs-container" class="mt-4 space-y-2"></div>
            </div>
        </div>

        <!-- 中间：叙事 -->
        <div class="panel flex flex-col">
            <div class="mb-4 flex border-b border-gray-900">
                <div class="tab-btn active" id="tab-room" onclick="switchTab('room')">火堆旁</div>
                <div class="tab-btn hidden" id="tab-village" onclick="switchTab('village')">村庄</div>
                <div class="tab-btn hidden" id="tab-map" onclick="switchTab('map')">荒野</div>
            </div>
            
            <div id="log" class="log-panel flex-1">
                <div class="log-entry">房间很冷。</div>
            </div>
        </div>

        <!-- 右侧：行动 -->
        <div class="panel actions-panel">
            <div id="view-room">
                <h2 class="text-xs font-bold mb-4 text-gray-600 uppercase">生存</h2>
                <button id="btn-stoke" onclick="stokeFire()">点燃火堆</button>
                <button id="btn-gather" class="hidden" onclick="actionWithProgress('gather', 1000)">在林中搜寻<div class="progress-bar" id="prog-gather"></div></button>
                <button id="btn-ai-narrative" class="sparkle-btn mt-6" onclick="getAINarrative()">✨ 描述当前氛围</button>
                
                <h2 id="title-craft" class="text-xs font-bold mt-10 mb-4 text-gray-600 uppercase hidden">制造</h2>
                <div id="craft-actions"></div>
            </div>

            <div id="view-village" class="hidden">
                <h2 class="text-xs font-bold mb-4 text-gray-600 uppercase">扩张</h2>
                <button id="btn-build-hut" onclick="build('hut')">简陋小屋 (<span id="cost-hut">10</span> 木头)</button>
                <button id="btn-build-furnace" class="hidden" onclick="build('furnace')">炼钢炉 (100 木头, 50 铁)</button>
            </div>

            <div id="view-map" class="hidden">
                <h2 class="text-xs font-bold mb-4 text-gray-600 uppercase">探索</h2>
                <button onclick="explore()">派遣探险队 (20 肉)</button>
                <div id="dungeon-info" class="mt-8 p-4 border border-gray-900 bg-black">
                    <div id="mine-depth" class="text-2xl font-bold text-blue-500">荒野 0 米</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // 自动注入
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'dark-room-ai-edition';

        // --- 游戏状态 ---
        const state = {
            wood: 0, fur: 0, meat: 0, iron: 0, steel: 0, coal: 0,
            pop: 0, idle: 0, fire: 0, isLit: false,
            depth: 0, weather: 'NORMAL',
            unlocks: new Set(),
            lastAIUpdate: 0
        };

        // --- Gemini API 集成 ---
        async function geminiFetch(prompt, systemPrompt = "你是一个神秘的、冷酷的克苏鲁式文字游戏引导者。请用极简的文字回答。") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            return "虚空中只传来阵阵回响。";
        }

        async function speakAI(text) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say in a deep, gravelly voice: ${text}` }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Charon" } } }
                        }
                    })
                });
                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                const audioBlob = new Blob([Uint8Array.from(atob(pcmData), c => c.charCodeAt(0))], { type: 'audio/l16' });
                // 转换并播放逻辑简略...（由于 PCM16 需要额外处理，这里主要展示调用流程）
            } catch (e) {}
        }

        async function getAIAdvice() {
            if (state.coal < 5) return addLog("煤炭不足，无法联络虚空。", "danger");
            state.coal -= 5;
            showToast("✨ 正在沟通虚空...");
            
            const prompt = `当前状态: 木头 ${state.wood}, 人口 ${state.pop}, 深度 ${state.depth}, 天气 ${state.weather}。请给一条简短的生存预言。`;
            const advice = await geminiFetch(prompt);
            showAIOverlay(advice, "✨ 虚空的低语");
            addLog(`虚空传来了旨意: ${advice}`, "highlight");
        }

        async function getAINarrative() {
            showToast("✨ 灵感汇聚中...");
            const prompt = `根据当前：火堆${state.isLit?'燃烧中':'熄灭'}, 天气${state.weather}, 木头${state.wood}。描述一下这个房间的景象。不超过30个字。`;
            const narrative = await geminiFetch(prompt, "你是一位擅长氛围描写的文学作家。");
            addLog(narrative, "info");
        }

        // --- 核心游戏逻辑 ---
        function stokeFire() {
            if (!state.isLit) {
                state.isLit = true; state.fire = 60;
                addLog("火烧起来了。");
                document.getElementById('btn-gather').classList.remove('hidden');
            } else if (state.wood >= 1) {
                state.wood--; state.fire += 40;
                addLog("火更旺了。");
            }
            if (state.wood >= 10) {
                document.getElementById('tab-village').classList.remove('hidden');
            }
        }

        function actionWithProgress(id, duration) {
            const bar = document.getElementById('prog-' + id);
            bar.style.width = '100%';
            setTimeout(() => {
                bar.style.transition = 'none'; bar.style.width = '0%';
                setTimeout(() => bar.style.transition = 'width linear', 10);
                if (id === 'gather') state.wood += 2;
                updateUI();
            }, duration);
        }

        // --- UI ---
        function addLog(text, type = '') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = text;
            document.getElementById('log').prepend(entry);
        }

        function showToast(text) {
            const toast = document.createElement('div');
            toast.className = 'ai-message';
            toast.textContent = text;
            document.getElementById('ai-overlay').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showAIOverlay(text, title) {
            const overlay = document.createElement('div');
            overlay.className = 'ai-message';
            overlay.innerHTML = `<strong class="block mb-1">${title}</strong>${text}`;
            document.getElementById('ai-overlay').appendChild(overlay);
            setTimeout(() => overlay.remove(), 8000);
        }

        function updateUI() {
            document.getElementById('count-wood').textContent = Math.floor(state.wood);
            document.getElementById('count-coal').textContent = Math.floor(state.coal);
            document.getElementById('count-fur').textContent = Math.floor(state.fur);
            document.getElementById('count-meat').textContent = Math.floor(state.meat);
            document.getElementById('pop-total').textContent = state.pop;
            
            const ambient = document.getElementById('ambient-filter');
            ambient.style.background = state.isLit ? `rgba(0,0,0,${Math.max(0, 0.4 - state.fire/200)})` : "rgba(0,0,0,0.85)";
        }

        function switchTab(tab) {
            ['room', 'village', 'map'].forEach(t => {
                document.getElementById('view-' + t).classList.toggle('hidden', t !== tab);
                document.getElementById('tab-' + t).classList.toggle('active', t === tab);
            });
        }

        // 简化的循环
        setInterval(() => {
            if (state.isLit) {
                state.fire -= 0.5;
                if (state.fire <= 0) { state.fire = 0; state.isLit = false; addLog("火熄灭了。", "danger"); }
            }
            updateUI();
        }, 1000);

        // 初始化模拟一些资源供测试AI功能
        state.coal = 10;
    </script>
</body>
</html>
